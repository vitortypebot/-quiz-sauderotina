<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Story 2 - Social Proof</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1080px; height: 1920px; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a0a2e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 80px;
            position: relative;
        }
        .top-bar {
            position: absolute;
            top: 60px;
            left: 80px;
            right: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand {
            font-size: 28px;
            font-weight: 800;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .swipe {
            font-size: 24px;
            color: #666;
        }
        .headline {
            font-size: 72px;
            font-weight: 900;
            color: white;
            text-align: center;
            line-height: 1.05;
            margin-bottom: 60px;
            text-transform: uppercase;
            letter-spacing: -2px;
        }
        .gold { color: #ffd700; }
        .avatars {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 60px;
        }
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 65px;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .rating {
            background: #ffd700;
            color: #0f0f0f;
            padding: 25px 60px;
            border-radius: 60px;
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 60px;
        }
        .reviews {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .review {
            background: rgba(255,215,0,0.08);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 24px;
            padding: 40px;
        }
        .stars { color: #ffd700; font-size: 28px; margin-bottom: 15px; }
        .text { color: white; font-size: 30px; font-style: italic; margin-bottom: 15px; line-height: 1.4; }
        .author { color: #ffd700; font-weight: 700; font-size: 24px; }
        .bottom {
            position: absolute;
            bottom: 80px;
            left: 80px;
            right: 80px;
            display: flex;
            justify-content: center;
        }
        .cta {
            background: #ffd700;
            color: #0f0f0f;
            padding: 35px 80px;
            border-radius: 60px;
            font-size: 36px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="brand">5 Minute Work Face</div>
        <div class="swipe">↑ Swipe up</div>
    </div>
    <h1 class="headline">2,500+ WOMEN <span class="gold">ALREADY</span> CHANGED THEIR LOOK</h1>
    <div class="avatars">
        <div class="avatar">👩</div>
        <div class="avatar">👩‍🦱</div>
        <div class="avatar">👩‍🦰</div>
        <div class="avatar">👱‍♀️</div>
    </div>
    <div class="rating">⭐ 4.9/5 RATING</div>
    <div class="reviews">
        <div class="review">
            <div class="stars">⭐⭐⭐⭐⭐</div>
            <p class="text">"I never knew I could do my makeup this fast!"</p>
            <p class="author">— Sarah, New York</p>
        </div>
        <div class="review">
            <div class="stars">⭐⭐⭐⭐⭐</div>
            <p class="text">"My coworkers keep asking me what changed!"</p>
            <p class="author">— Emily, Los Angeles</p>
        </div>
    </div>
    <div class="bottom">
        <div class="cta">Join Them →</div>
    </div>
</body>
</html>
