<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Ad 2 - Social Proof</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1080px; height: 1080px; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #6c5ce7 0%, #a855f7 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 70px;
            position: relative;
        }
        .headline {
            font-size: 60px;
            font-weight: 900;
            color: white;
            text-align: center;
            line-height: 1.05;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: -2px;
        }
        .gold { color: #ffd700; }
        .avatars {
            display: flex;
            gap: 25px;
            margin-bottom: 50px;
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            border: 4px solid white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .rating {
            background: #ffd700;
            color: #1a1a2e;
            padding: 20px 50px;
            border-radius: 50px;
            font-size: 34px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 45px;
        }
        .reviews {
            display: flex;
            gap: 25px;
            width: 100%;
        }
        .review {
            background: rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 30px;
            flex: 1;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .stars { color: #ffd700; font-size: 22px; margin-bottom: 12px; }
        .text { color: white; font-size: 22px; font-style: italic; margin-bottom: 12px; line-height: 1.4; }
        .author { color: #ffd700; font-weight: 700; font-size: 18px; }
    </style>
</head>
<body>
    <h1 class="headline">2,500+ WOMEN <span class="gold">ALREADY TRANSFORMED</span> THEIR LOOK</h1>
    <div class="avatars">
        <div class="avatar">👩</div>
        <div class="avatar">👩‍🦱</div>
        <div class="avatar">👩‍🦰</div>
        <div class="avatar">👱‍♀️</div>
        <div class="avatar">👩‍🦳</div>
    </div>
    <div class="rating">⭐ 4.9/5 RATING</div>
    <div class="reviews">
        <div class="review">
            <div class="stars">⭐⭐⭐⭐⭐</div>
            <p class="text">"I never knew I could do my makeup so fast!"</p>
            <p class="author">— Sarah, NYC</p>
        </div>
        <div class="review">
            <div class="stars">⭐⭐⭐⭐⭐</div>
            <p class="text">"My husband can't believe the transformation!"</p>
            <p class="author">— Emily, LA</p>
        </div>
        <div class="review">
            <div class="stars">⭐⭐⭐⭐⭐</div>
            <p class="text">"Best investment I've ever made!"</p>
            <p class="author">— Jessica, TX</p>
        </div>
    </div>
</body>
</html>
