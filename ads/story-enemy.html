<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Story 1 - Enemy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1080px; height: 1920px; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #0f0f0f 0%, #1a0a0a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 80px;
            position: relative;
        }
        .top-bar {
            position: absolute;
            top: 60px;
            left: 80px;
            right: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand {
            font-size: 28px;
            font-weight: 800;
            color: #ff4757;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .swipe {
            font-size: 24px;
            color: #666;
        }
        .main-icon {
            font-size: 180px;
            margin-bottom: 60px;
        }
        .headline {
            font-size: 82px;
            font-weight: 900;
            color: white;
            text-align: center;
            line-height: 1.05;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: -3px;
        }
        .red { color: #ff4757; }
        .sub {
            font-size: 38px;
            color: #888;
            text-align: center;
            margin-bottom: 80px;
            line-height: 1.4;
        }
        .problems {
            width: 100%;
            background: rgba(255, 71, 87, 0.08);
            border: 2px solid rgba(255, 71, 87, 0.3);
            border-radius: 30px;
            padding: 50px;
        }
        .problem {
            display: flex;
            align-items: center;
            gap: 25px;
            color: white;
            font-size: 34px;
            margin-bottom: 35px;
            line-height: 1.3;
        }
        .problem:last-child { margin-bottom: 0; }
        .x { color: #ff4757; font-size: 48px; font-weight: 900; flex-shrink: 0; }
        .bottom {
            position: absolute;
            bottom: 80px;
            left: 80px;
            right: 80px;
            display: flex;
            justify-content: center;
        }
        .cta {
            background: #ff4757;
            color: white;
            padding: 35px 80px;
            border-radius: 60px;
            font-size: 36px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="brand">5 Minute Work Face</div>
        <div class="swipe">↑ Swipe up</div>
    </div>
    <div class="main-icon">😱</div>
    <h1 class="headline">STOP MAKING <span class="red">THESE</span> MISTAKES</h1>
    <p class="sub">Every single day you're wasting time on makeup that doesn't work</p>
    <div class="problems">
        <div class="problem"><span class="x">✗</span> Foundation that looks like a mask</div>
        <div class="problem"><span class="x">✗</span> Makeup that melts by lunch</div>
        <div class="problem"><span class="x">✗</span> Spending 30+ min every morning</div>
    </div>
    <div class="bottom">
        <div class="cta">Learn the Fix →</div>
    </div>
</body>
</html>
