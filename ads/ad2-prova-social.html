<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Image 2 - Prova Social</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            position: relative;
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
        }
        
        .bg-circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 30% 70%, rgba(255, 255, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 70% 30%, rgba(255, 255, 255, 0.1) 0%, transparent 40%);
        }
        
        .headline {
            font-size: 56px;
            font-weight: 900;
            color: #ffffff;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: -2px;
        }
        
        .highlight {
            color: #ffd93d;
        }
        
        .avatars-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd93d 0%, #ff6b6b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .count-badge {
            background: #ffd93d;
            color: #1a1a2e;
            padding: 20px 50px;
            border-radius: 60px;
            font-size: 36px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .testimonials {
            display: flex;
            gap: 30px;
            max-width: 900px;
        }
        
        .testimonial {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            flex: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .testimonial-text {
            color: #ffffff;
            font-size: 22px;
            font-style: italic;
            margin-bottom: 15px;
        }
        
        .testimonial-author {
            color: #ffd93d;
            font-weight: 700;
            font-size: 18px;
        }
        
        .stars {
            color: #ffd93d;
            font-size: 24px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="bg-circles"></div>
    <div class="container">
        <h1 class="headline">
            +2.500 MULHERES <span class="highlight">JÁ TRANSFORMARAM</span> SEU ESTILO
        </h1>
        <div class="avatars-grid">
            <div class="avatar">👩</div>
            <div class="avatar">👩‍🦱</div>
            <div class="avatar">👩‍🦰</div>
            <div class="avatar">👱‍♀️</div>
        </div>
        <div class="count-badge">⭐ 4.9/5 AVALIAÇÃO</div>
        <div class="testimonials">
            <div class="testimonial">
                <div class="stars">⭐⭐⭐⭐⭐</div>
                <p class="testimonial-text">"Nunca imaginei que poderia fazer maquiagem tão rápido!"</p>
                <p class="testimonial-author">- Ana, São Paulo</p>
            </div>
            <div class="testimonial">
                <div class="stars">⭐⭐⭐⭐⭐</div>
                <p class="testimonial-text">"Meu marido não acredita no resultado!"</p>
                <p class="testimonial-author">- Maria, Rio</p>
            </div>
            <div class="testimonial">
                <div class="stars">⭐⭐⭐⭐⭐</div>
                <p class="testimonial-text">"Valeu cada centavo, recomendo demais!"</p>
                <p class="testimonial-author">- Júlia, BH</p>
            </div>
        </div>
    </div>
</body>
</html>
