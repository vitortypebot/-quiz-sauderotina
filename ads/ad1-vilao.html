<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Image 1 - Vilão</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            position: relative;
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
        }
        
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(255, 107, 107, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 107, 107, 0.1) 0%, transparent 50%);
        }
        
        .warning-icon {
            font-size: 120px;
            margin-bottom: 40px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .headline {
            font-size: 64px;
            font-weight: 900;
            color: #ffffff;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: -2px;
        }
        
        .highlight {
            color: #ff6b6b;
            display: block;
        }
        
        .subheadline {
            font-size: 32px;
            color: #cccccc;
            text-align: center;
            margin-bottom: 50px;
            max-width: 800px;
        }
        
        .problem-box {
            background: rgba(255, 107, 107, 0.15);
            border: 2px solid #ff6b6b;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
        }
        
        .problem-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 28px;
        }
        
        .problem-item:last-child {
            margin-bottom: 0;
        }
        
        .problem-icon {
            font-size: 36px;
        }
        
        .badge {
            position: absolute;
            top: 40px;
            right: 40px;
            background: #ff6b6b;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 24px;
            text-transform: uppercase;
            transform: rotate(5deg);
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="container">
        <div class="badge">ALERTA</div>
        <div class="warning-icon">⚠️</div>
        <h1 class="headline">
            VOCÊ ESTÁ <span class="highlight">COMETENDO</span> ESSES ERROS?
        </h1>
        <p class="subheadline">A maioria das mulheres perde tempo e dinheiro com maquiagem</p>
        <div class="problem-box">
            <div class="problem-item">
                <span class="problem-icon">❌</span>
                <span>Base na cor errada que parece máscara</span>
            </div>
            <div class="problem-item">
                <span class="problem-icon">❌</span>
                <span>Maquiagem que não dura nem 2 horas</span>
            </div>
            <div class="problem-item">
                <span class="problem-icon">❌</span>
                <span>Horas espelhando e sempre com resultado ruim</span>
            </div>
        </div>
    </div>
</body>
</html>
